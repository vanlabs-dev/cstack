name: ci

on:
  push:
    branches: [main]
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: sync python deps
        run: uv sync --all-packages

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: regen and diff openapi.json
        run: |
          uv run python -m signalguard_api.regenerate_openapi
          git diff --exit-code apps/signalguard-api/openapi.json

      - name: install node deps
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm format check
        run: pnpm format:check

      - name: regen and diff web api client
        run: |
          pnpm --filter signalguard-web generate:api
          git diff --exit-code apps/signalguard-web/src/lib/api/generated

      - name: web typecheck
        run: pnpm --filter signalguard-web typecheck

      - name: web test
        run: pnpm --filter signalguard-web test

      - name: web build
        run: pnpm --filter signalguard-web build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
