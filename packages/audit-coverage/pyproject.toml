[project]
name = "cstack-audit-coverage"
version = "0.0.1"
description = "Coverage matrix computation for cstack signalguard"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "cstack-schemas",
    "cstack-audit-core",
    "cstack-storage",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_audit_coverage"]
