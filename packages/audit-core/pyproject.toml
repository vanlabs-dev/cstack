[project]
name = "cstack-audit-core"
version = "0.0.1"
description = "Shared finding model, severity, and persistence helpers for cstack audit modules"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "duckdb>=1.1",
    "cstack-schemas",
    "cstack-storage",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_audit_core"]
