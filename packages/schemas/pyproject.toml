[project]
name = "cstack-schemas"
version = "0.0.1"
description = "Pydantic models for Microsoft Graph entities used across cstack tools"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_schemas"]
