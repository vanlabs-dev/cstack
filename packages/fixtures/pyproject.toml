[project]
name = "cstack-fixtures"
version = "0.0.1"
description = "Synthetic Microsoft Graph payloads for offline cstack development"
requires-python = ">=3.12"
dependencies = [
    "cstack-schemas",
    "cstack-storage",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_fixtures"]

[tool.hatch.build.targets.wheel.force-include]
"src/cstack_fixtures/data" = "cstack_fixtures/data"
