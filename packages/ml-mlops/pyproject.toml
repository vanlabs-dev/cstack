[project]
name = "cstack-ml-mlops"
version = "0.0.1"
description = "MLflow tracking, registry aliases, drift PSI, and shadow scoring for cstack"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "mlflow>=2.18",
    "numpy>=2.0",
    "pandas>=2.2",
    "scipy>=1.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_ml_mlops"]
