[project]
name = "cstack-llm-narrative"
version = "0.0.1"
description = "Finding-to-narrative pipeline with content-addressed prompt cache"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "python-json-logger>=2.0",
    "duckdb>=1.1",
    "cstack-llm-provider",
    "cstack-storage",
    "cstack-audit-core",
    "cstack-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_llm_narrative"]
