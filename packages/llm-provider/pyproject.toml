[project]
name = "cstack-llm-provider"
version = "0.0.1"
description = "Provider-agnostic LLM abstraction with Anthropic, OpenAI, and Ollama adapters"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.39",
    "openai>=1.50",
    "httpx>=0.27",
    "tiktoken>=0.8",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "python-json-logger>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_llm_provider"]
