[project]
name = "cstack-ml-features"
version = "0.0.1"
description = "Feature engineering pipeline for cstack signalguard sign-in anomaly detection"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "numpy>=2.0",
    "pandas>=2.2",
    "geoip2>=4.8",
    "cstack-schemas",
    "cstack-storage",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_ml_features"]
