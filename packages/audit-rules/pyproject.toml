[project]
name = "cstack-audit-rules"
version = "0.0.1"
description = "Best-practice CA rule registry and evaluators for cstack signalguard"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "cstack-schemas",
    "cstack-storage",
    "cstack-audit-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_audit_rules"]
