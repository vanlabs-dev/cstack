[project]
name = "cstack-storage"
version = "0.0.1"
description = "DuckDB-backed storage layer for cstack tools"
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.1",
    "pydantic>=2.9",
    "cstack-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_storage"]
