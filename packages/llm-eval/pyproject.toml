[project]
name = "cstack-llm-eval"
version = "0.0.1"
description = "Rubric-based LLM-as-judge evaluation harness for finding narratives"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "duckdb>=1.1",
    "cstack-llm-provider",
    "cstack-llm-narrative",
    "cstack-audit-core",
    "cstack-storage",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cstack_llm_eval"]
